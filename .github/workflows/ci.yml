name: MLOps CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download dataset
        run: python -c "import urllib.request; urllib.request.urlretrieve('https://archive.ics.uci.edu/ml/machine-learning-databases/wine-quality/winequality-red.csv', 'data/winequality-red.csv')"

      - name: Train models
        run: python src/train.py

      - name: Register best model
        run: python src/register.py

      - name: Start API in background
        run: uvicorn api.main:app --host 0.0.0.0 --port 8000 &

      - name: Wait for API startup
        run: sleep 5

      - name: Run tests
        run: pytest tests/ -v

      - name: Upload MLflow DB
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db
          retention-days: 7
